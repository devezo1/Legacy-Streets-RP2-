<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://0utlawrp.com/assets/landing/css/bootstrap.css?v=1772913031">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <title>Select Game - Legacy Streets</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body data-theme="fivem">

    <div class="cursor"></div>

    <div class="select-game-page">
        
        <!-- Large Background Logo -->
        <img src="../logo.png" class="bg-logo-large" alt="bg-logo">

        <!-- Side Branding -->
        <div class="side-branding left">
            <span>L</span><span>E</span><span>G</span><span>A</span><span>C</span><span>Y</span>
        </div>
        <div class="side-branding right">
            <span>L</span><span>E</span><span>G</span><span>A</span><span>C</span><span>Y</span>
        </div>

        <!-- Floating Decorative Icons -->
        <i class="ti ti-arrow-up-right floating-icon" style="top: 15%; left: 15%;"></i>
        <i class="ti ti-arrow-up-right floating-icon" style="top: 25%; right: 20%; transform: rotate(90deg);"></i>
        <i class="ti ti-arrow-up-right floating-icon" style="bottom: 20%; left: 10%; transform: rotate(180deg);"></i>
        <i class="ti ti-arrow-up-right floating-icon" style="bottom: 15%; right: 15%; transform: rotate(-90deg);"></i>
        <i class="ti ti-arrow-up-right floating-icon" style="top: 45%; right: 35%; opacity: 0.05;"></i>
        <i class="ti ti-arrow-up-right floating-icon" style="bottom: 40%; left: 30%; opacity: 0.05;"></i>

        <h1 class="game-select-title-new reveal">Select the Game</h1>

        <div class="games-container-new">
            
            <!-- GTA V -->
            <a href="index.html" class="game-card-new gta-v reveal">
                <i class="ti ti-device-gamepad-2 card-corner-icon"></i>
                <div class="game-card-icon-wrap">
                    <img src="../logo.png" alt="GTA V">
                </div>
                <div class="card-bottom-strip">
                    <div class="strip-dots">
                        <span></span>
                        <span class="dot-main"></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span class="card-name-strip">GTA V</span>
                    <div class="strip-dots">
                        <span></span>
                        <span></span>
                        <span class="dot-main"></span>
                        <span></span>
                    </div>
                </div>
            </a>

            <!-- RED DEAD -->
            <a href="#" class="game-card-new red-dead reveal" style="transition-delay: 0.1s;">
                <i class="ti ti-device-gamepad-2 card-corner-icon"></i>
                <div class="game-card-icon-wrap">
                    <img src="../logo.png" alt="RED DEAD">
                </div>
                <div class="card-bottom-strip">
                    <div class="strip-dots">
                        <span></span>
                        <span class="dot-main"></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span class="card-name-strip">RED DEAD</span>
                    <div class="strip-dots">
                        <span></span>
                        <span></span>
                        <span class="dot-main"></span>
                        <span></span>
                    </div>
                </div>
            </a>

        </div>

        <div class="mt-5 reveal" style="position: relative; z-index: 10;">
             <a href="index.html" style="color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.9rem; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px;">
                <i class="ti ti-chevron-left"></i> BACK TO HOME
             </a>
        </div>
    </div>

    <script src="https://0utlawrp.com/assets/landing/js/jquery.min.js"></script>
    <script src="../app.js"></script>
</body>

</html>
