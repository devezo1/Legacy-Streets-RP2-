<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile - Legacy Streets RP</title>
    <link rel="shortcut icon" href="../logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://0utlawrp.com/assets/landing/css/bootstrap.css?v=1772913031">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0a0a; font-family: 'Poppins', sans-serif; min-height: 100vh; overflow-x: hidden; }

        .auth-bg {
            position: fixed; inset: 0; z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(0, 240, 255, 0.06) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(0, 64, 68, 0.08) 0%, transparent 60%),
                        #0a0a0a;
        }
        .auth-bg::before {
            content: ''; position: absolute; inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(0, 240, 255, 0.07) 1px, transparent 0);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { from { transform: translateY(0); } to { transform: translateY(40px); } }

        .auth-container {
            position: relative; z-index: 10;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 2rem 1rem;
        }

        .auth-card {
            width: 100%; max-width: 500px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Progress steps */
        .steps-bar {
            display: flex; align-items: center; gap: 0; margin-bottom: 2rem;
        }
        .step-item {
            display: flex; flex-direction: column; align-items: center; flex: 1; position: relative;
        }
        .step-item:not(:last-child)::after {
            content: ''; position: absolute; top: 18px; left: 50%; width: 100%; height: 2px;
            background: rgba(255,255,255,0.08); z-index: 0;
            transition: background 0.4s;
        }
        .step-item.done:not(:last-child)::after { background: #00f0ff; }
        .step-circle {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; z-index: 1;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3);
            transition: all 0.4s;
        }
        .step-item.active .step-circle { border-color: #00f0ff; background: rgba(0, 240, 255, 0.12); color: #00f0ff; box-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }
        .step-item.done .step-circle { border-color: #10b981; background: rgba(16,185,129,0.15); color: #10b981; }
        .step-label { font-size: 0.62rem; color: rgba(255,255,255,0.25); margin-top: 0.4rem; letter-spacing: 0.5px; text-align: center; }
        .step-item.active .step-label { color: #00f0ff; }
        .step-item.done .step-label { color: #10b981; }

        /* Logo / header */
        .auth-logo-wrap { text-align: center; margin-bottom: 1.75rem; }
        .auth-logo-wrap img { width: 55px; filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.4)); animation: pulse 3s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.3)); } 50% { filter: drop-shadow(0 0 25px rgba(0, 240, 255, 0.6)); } }
        .auth-logo-wrap h1 {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.4rem; font-weight: 700; letter-spacing: 2px;
            color: #fff; margin-top: 0.6rem; margin-bottom: 0.2rem;
        }
        .auth-logo-wrap p { color: rgba(255,255,255,0.35); font-size: 0.78rem; }

        /* Connected badge */
        .connected-badge {
            display: flex; align-items: center; gap: 0.75rem;
            background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2);
            border-radius: 12px; padding: 0.7rem 1rem; margin-bottom: 1.25rem;
        }
        .connected-badge i { color: #10b981; font-size: 1.2rem; flex-shrink: 0; }
        .connected-badge .badge-info .badge-label { font-size: 0.68rem; color: #10b981; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
        .connected-badge .badge-info .badge-val { font-size: 0.82rem; color: rgba(255,255,255,0.7); }

        /* Steam connect btn */
        .btn-steam-connect {
            display: flex; align-items: center; justify-content: center; gap: 0.6rem;
            width: 100%; padding: 0.8rem;
            background: #00f0ff;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #0a0a0a;
            font-family: 'Poppins', sans-serif; font-size: 0.85rem; font-weight: 600;
            text-decoration: none; transition: all 0.25s; margin-bottom: 1.25rem;
        }
        .btn-steam-connect:hover { color: #0a0a0a; background: #00b8c4; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 240, 255, 0.4); }
        .btn-steam-connect.connected { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: #10b981; pointer-events: none; }
        .btn-steam-connect i { font-size: 1.1rem; }

        /* Form fields */
        .field-group { margin-bottom: 0.9rem; }
        .field-label { display: block; font-size: 0.68rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 0.35rem; }
        .field-input {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 0.72rem 1rem;
            color: #fff; font-size: 0.85rem; font-family: 'Poppins', sans-serif;
            transition: all 0.25s; outline: none;
        }
        .field-input:focus { border-color: rgba(0, 240, 255, 0.45); background: rgba(0, 240, 255, 0.04); box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.08); }
        .field-input::placeholder { color: rgba(255,255,255,0.18); }

        /* Submit button */
        .btn-primary-auth {
            width: 100%; padding: 0.85rem;
            background: linear-gradient(135deg, #00f0ff 0%, #004044 100%);
            border: none; border-radius: 12px;
            color: #fff; font-family: 'Poppins', sans-serif;
            font-size: 0.9rem; font-weight: 700; letter-spacing: 1px;
            cursor: pointer; transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.2);
            margin-top: 0.5rem;
        }
        .btn-primary-auth:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0, 240, 255, 0.4); }
        .btn-primary-auth:disabled { opacity: 0.4; cursor: not-allowed; }

        .auth-alert { padding: 0.65rem 1rem; border-radius: 10px; font-size: 0.78rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .auth-alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
        .auth-alert.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #6ee7b7; }

        .auth-footer-text { text-align: center; margin-top: 1.25rem; color: rgba(255,255,255,0.25); font-size: 0.75rem; }
        .auth-footer-text a { color: rgba(0, 240, 255, 0.6); text-decoration: none; }
        .auth-footer-text a:hover { color: #00f0ff; }
    </style>
</head>
<body>
    <div class="auth-bg"></div>

    <div class="auth-container">
        <div class="auth-card">

            <!-- Progress Steps -->
            <div class="steps-bar">
                <div class="step-item done" id="step1">
                    <div class="step-circle"><i class="ti ti-brand-discord"></i></div>
                    <span class="step-label">Discord</span>
                </div>
                <div class="step-item" id="step2">
                    <div class="step-circle"><i class="ti ti-brand-steam"></i></div>
                    <span class="step-label">Steam</span>
                </div>
                <div class="step-item" id="step3">
                    <div class="step-circle"><i class="ti ti-user-check"></i></div>
                    <span class="step-label">Profile</span>
                </div>
            </div>

            <div class="auth-logo-wrap">
                <img src="../logo.png" alt="Legacy Streets RP">
                <h1>COMPLETE PROFILE</h1>
                <p>Set up your account to join Legacy Streets RP</p>
            </div>

            <div id="alert-box" class="auth-alert" style="display:none;">
                <i class="ti ti-info-circle"></i>
                <span id="alert-text"></span>
            </div>

            <!-- Discord connected indicator (dynamic) -->
            <div class="connected-badge" id="discord-badge" style="display:none;">
                <i class="ti ti-brand-discord"></i>
                <div class="badge-info">
                    <div class="badge-label">Discord Connected</div>
                    <div class="badge-val" id="discord-badge-name">—</div>
                </div>
            </div>

            <!-- Steam connect button -->
            <a href="/auth/steam?mode=link" id="link-steam-btn" class="btn-steam-connect">
                <i class="ti ti-brand-steam"></i>
                <span id="steam-btn-text">CONNECT STEAM TO CONTINUE</span>
            </a>

            <!-- Profile form -->
            <form id="setup-form">
                <div class="field-group">
                    <label class="field-label">Username</label>
                    <input type="text" id="reg-username" class="field-input" placeholder="Choose a username" required autocomplete="username">
                </div>
                <div class="field-group">
                    <label class="field-label">Email</label>
                    <input type="email" id="reg-email" class="field-input" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="field-group">
                    <label class="field-label">Password</label>
                    <input type="password" id="reg-password" class="field-input" placeholder="Create a password" required autocomplete="new-password">
                </div>
                <div class="field-group">
                    <label class="field-label">Confirm Password</label>
                    <input type="password" id="reg-password-confirm" class="field-input" placeholder="Repeat your password" required autocomplete="new-password">
                </div>

                <button type="submit" id="submit-reg-btn" class="btn-primary-auth" disabled>
                    COMPLETE REGISTRATION
                </button>
            </form>

            <div class="auth-footer-text">
                Already have an account? <a href="login.html">Sign In</a>
            </div>

        </div>
    </div>

    <script src="https://0utlawrp.com/assets/landing/js/jquery.min.js"></script>
    <script>
        // Restore saved form inputs from sessionStorage (before Steam redirect)
        ['reg-username','reg-email','reg-password','reg-password-confirm'].forEach(id => {
            const saved = sessionStorage.getItem('setup_' + id);
            if (saved) document.getElementById(id).value = saved;
        });

        // Save inputs when clicking steam link
        document.getElementById('link-steam-btn').addEventListener('click', () => {
            ['reg-username','reg-email','reg-password','reg-password-confirm'].forEach(id => {
                sessionStorage.setItem('setup_' + id, document.getElementById(id).value);
            });
        });

        function showAlert(msg, type = 'error') {
            const box = document.getElementById('alert-box');
            box.className = 'auth-alert ' + type;
            document.getElementById('alert-text').textContent = msg;
            box.style.display = 'flex';
        }

        // Check login state & update UI
        fetch('/api/me').then(r => r.json()).then(data => {
            const step2 = document.getElementById('step2');
            const step3 = document.getElementById('step3');
            const steamBtn = document.getElementById('link-steam-btn');
            const submitBtn = document.getElementById('submit-reg-btn');
            const discordBadge = document.getElementById('discord-badge');

            if (!data.loggedIn) {
                // Not logged in at all — redirect to login
                window.location.href = 'login.html';
                return;
            }

            const user = data.user;

            // If fully registered, go to home
            if (user.isFullyRegistered) {
                window.location.href = 'index.html';
                return;
            }

            // Show discord connected badge
            if (user.discordConnected) {
                discordBadge.style.display = 'flex';
                document.getElementById('discord-badge-name').textContent = user.discordGlobalName || user.username || user.discordUsername || 'Connected';
                // Pre-fill email from discord if available
                if (user.email && !document.getElementById('reg-email').value) {
                    document.getElementById('reg-email').value = user.email;
                }
                if (user.username && !document.getElementById('reg-username').value) {
                    document.getElementById('reg-username').value = user.username;
                }
            }

            // Update steps & steam button
            if (user.steamConnected) {
                step2.className = 'step-item done';
                step3.className = 'step-item active';
                steamBtn.className = 'btn-steam-connect connected';
                steamBtn.innerHTML = '<i class="ti ti-circle-check"></i><span>STEAM CONNECTED ✓</span>';
                submitBtn.disabled = false;
            } else {
                step2.className = 'step-item active';
                step3.className = 'step-item';
            }
        }).catch(() => window.location.href = 'login.html');

        // Handle form submit
        document.getElementById('setup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-password-confirm').value;

            if (password !== confirm) return showAlert('Passwords do not match.', 'error');
            if (password.length < 6) return showAlert('Password must be at least 6 characters.', 'error');

            const btn = document.getElementById('submit-reg-btn');
            btn.disabled = true;
            btn.textContent = 'SAVING...';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (data.success) {
                    sessionStorage.clear();
                    showAlert('Registration complete! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    showAlert(data.message || 'Registration failed.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'COMPLETE REGISTRATION';
                }
            } catch (err) {
                showAlert('Server error. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'COMPLETE REGISTRATION';
            }
        });
    </script>
</body>
</html>
